services:

  # ── PHP-FPM App ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        VITE_APP_NAME: "${APP_NAME:-Jewelry CMS}"
    image: tho493/jewelry-cms:latest
    container_name: jewelry_app
    restart: unless-stopped
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      DB_USERNAME: "root"
      DB_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
      TINY_CLOUD_KEY: "${TINY_CLOUD_KEY}"
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jewelry_net
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Queue Worker ─────────────────────────────────────────────
  queue:
    image: tho493/jewelry-cms:latest
    container_name: jewelry_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      DB_USERNAME: "root"
      DB_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - jewelry_net

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: jewelry_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8100}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/var/www/html/storage/app/public:ro
    depends_on:
      - app
    networks:
      - jewelry_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MySQL 8 ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: jewelry_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "${MYSQL_PORT:-33306}:3306"
    networks:
      - jewelry_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── phpMyAdmin (optional – chỉ dùng khi dev/staging) ─────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: jewelry_pma
    restart: unless-stopped
    profiles: ["dev"]          # chỉ start khi: docker compose --profile dev up
    environment:
      PMA_HOST: mysql
      PMA_USER: "${DB_USERNAME:-jewelry}"
      PMA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${PMA_PORT:-8181}:80"
    depends_on:
      - mysql
    networks:
      - jewelry_net

# ── Named Volumes ────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  jewelry_net:
    driver: bridge
