version: "3.9"

services:

  app:
    image: tho493/jewelry-cms:latest
    container_name: jewelry_app
    restart: unless-stopped

    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}

      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      DB_USERNAME: root
      DB_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
      TINY_CLOUD_KEY: "${TINY_CLOUD_KEY}"

    volumes:
      - app_storage:/var/www/html/storage

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - jewelry_net


  nginx:
    build:
      context: ./
      dockerfile: Dockerfile.nginx
    container_name: jewelry_nginx
    restart: unless-stopped

    ports:
      - "8100:80"

    volumes:
      - app_storage:/var/www/html/storage:ro

    depends_on:
      - app

    networks:
      - jewelry_net


  mysql:
    image: mysql:8.0
    container_name: jewelry_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "${MYSQL_PORT:-33306}:3306"
    networks:
      - jewelry_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  app_storage:

networks:
  jewelry_net: