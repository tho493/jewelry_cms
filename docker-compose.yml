services:

  # ── PHP-FPM App (Chứa Logic PHP) ─────────────────────────────
  app:
    image: tho493/jewelry-cms:latest
    container_name: jewelry_app
    restart: unless-stopped
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost}"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      DB_USERNAME: "root"
      DB_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      FILESYSTEM_DISK: public
      TINY_CLOUD_KEY: "${TINY_CLOUD_KEY}"
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jewelry_net
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Queue Worker (Xử lý tác vụ ngầm) ──────────────────────────
  queue:
    image: tho493/jewelry-cms:latest
    container_name: jewelry_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      DB_HOST: mysql
      DB_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      DB_USERNAME: "root"
      DB_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
    volumes:
      - app_storage:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - jewelry_net

  # ── Nginx (Máy chủ Web) ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: jewelry_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8100}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage/app/public:ro
    depends_on:
      - app
    networks:
      - jewelry_net

  # ── MySQL 8 (Cơ sở dữ liệu) ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: jewelry_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-jewelry_cms}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret_root}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "${MYSQL_PORT:-33306}:3306"
    networks:
      - jewelry_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

networks:
  jewelry_net:
    driver: bridge